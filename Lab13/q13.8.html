<html>
  <head>
    <title>q13.8</title>
	<script language="JavaScript">
	  let n=15,flag=0;
	  function isPrime(n)
	  {
	    for(i=2;i<n;i++)
		{
		  if(n%i==0)
		  {
		    flag++;
			break;
		  }
		}
		if(flag==0)
		{
		  return True
		}
		else
		{
		  return False
		}
	  }
	  let m=isPrime(n);
	  document.write(m);
	</script>
  </head>
  <body>
  </body>
</html>
