<html>
  <head>
    <title>q13.1</title>
	<script language="JavaScript">
	  let m=parseInt(prompt("Enter your marks:"));
	  let grade;
	  if(m>=90)
	  {
	    grade="A";
	  }
	  else if(m>=75)
	  {
	    grade="B";
	  }
	  else if(m>=50)
	  {
	    grade="C";
	  }
	  else
	  {
	    grade="Fail";
	  }
	  document.write("Your grade:"+grade);
	</script>
  </head>
  <body>
  </body>
</html>
