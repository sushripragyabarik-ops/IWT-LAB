<html>
  <head>
    <title>q13.7</title>
	<script language="JavaScript">
	  let a=new Array(0,10,9,10,0,4,5,6,4,5,1);
	  for(i=0;i<a.length;i++)
	  {
	    flag=0;
	    for(j=0;j<a.length;j++)
		{
		  if(a[i]==a[j])
		  {
		    flag++;
		  }
		}
		document.write(a[i]+" repeats "+flag+" times <br>");
	  }
	  document.write("array:"+a);
	</script>
  </head>
  <body>
  </body>
</html>
